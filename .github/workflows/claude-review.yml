name: Claude Review

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude'

          additional_permissions: |
            actions: read

          prompt: '/review'

          claude_args: >-
            --allowedTools
            Bash(git *)
            Bash(gh *)
            Read
            Glob
            Grep
            Agent
          show_full_output: true
